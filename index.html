<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مسجد تکیه حسینی کبودراهنگ</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: black;
      overflow: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* پوستر با افکت زوم */
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: zoom 20s infinite alternate;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    /* لایه تاریک */
    .overlay {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 60px;
    }

    /* دکمه‌ها */
    .btn {
      width: 260px;
      margin: 10px;
      padding: 15px;
      text-align: center;
      border-radius: 15px;
      font-size: 18px;
      color: white;
      text-decoration: none;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      transition: 0.3s;
      animation: fadeIn 2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.25);
    }

    .insta {
      background: linear-gradient(45deg, #e1306c, #ff7a00);
    }

    .eitaa {
      background: linear-gradient(45deg, #27ae60, #2ecc71);
    }

    /* انیمیشن ورود */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* متن پایین */
    .footer {
      position: absolute;
      bottom: 10px;
      color: #ddd;
      font-size: 14px;
      text-align: center;
      width: 100%;
    }

  </style>
</head>

<body>

  <div class="hero">

    <!-- پوستر -->
    <img src="poster.jpg" alt="پوستر مسجد">

    <!-- دکمه‌ها -->
    <div class="overlay">

      <a class="btn insta" href="https://www.instagram.com/masjed_takie_hosseiny" target="_blank">
        📸 اینستاگرام
      </a>

      <a class="btn eitaa" href="https://eitaa.com/masjedtakye" target="_blank">
        💬 ایتا
      </a>

    </div>

    <!-- متن پایین -->
    <div class="footer">
      مسجد تکیه حسینی کبودراهنگ
    </div>

  </div>

</body>
</html>
