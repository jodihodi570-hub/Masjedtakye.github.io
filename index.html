<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>مسجد تکیه حسینی کبودراهنگ</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

.hero {
  position: relative;
  height: 100vh;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
}

.btn {
  display: block;
  width: 250px;
  margin: 10px auto;
  padding: 15px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-size: 18px;
}

.insta {
  background: #e1306c;
}

.eitaa {
  background: #27ae60;
}
</style>

</head>

<body>

<div class="hero">

  <!-- عکس (فعلاً از اینترنت که حتماً کار کنه) -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Imam_Hussain_Shrine_Karbala.jpg">

  <div class="overlay">

    <a class="btn insta" href="https://www.instagram.com/masjed_takie_hosseiny" target="_blank">
      📸 اینستاگرام
    </a>

    <a class="btn eitaa" href="https://eitaa.com/masjedtakye" target="_blank">
      💬 ایتا
    </a>

  </div>

</div>

</body>
</html>
